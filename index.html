<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculadora Flex - Etanol ou Gasolina?</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }

    body {
      background-color: #f4f6f8;
      color: #333;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    .card {
      background-color: #ffffff;
      padding: 30px;
      border-radius: 16px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.08);
      width: 100%;
      max-width: 420px;
    }

    h1 {
      font-size: 1.5rem;
      text-align: center;
      margin-bottom: 8px;
      color: #1a1a1a;
    }

    p.subtitle {
      font-size: 0.875rem;
      text-align: center;
      color: #666;
      margin-bottom: 24px;
    }

    .input-group {
      margin-bottom: 18px;
    }

    label {
      display: block;
      font-size: 0.9rem;
      font-weight: 600;
      margin-bottom: 6px;
      color: #444;
    }

    .input-wrapper {
      position: relative;
      display: flex;
      align-items: center;
    }

    .currency {
      position: absolute;
      left: 12px;
      color: #888;
      font-weight: 500;
    }

    input[type="number"] {
      width: 100%;
      padding: 12px 12px 12px 40px;
      border: 2px solid #e1e5eb;
      border-radius: 8px;
      font-size: 1.1rem;
      outline: none;
      transition: border-color 0.2s;
    }

    input[type="number"]:focus {
      border-color: #2563eb;
    }

    button {
      width: 100%;
      padding: 14px;
      background-color: #2563eb;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      margin-top: 10px;
      transition: background-color 0.2s;
    }

    button:hover {
      background-color: #1d4ed8;
    }

    .result {
      margin-top: 24px;
      padding: 16px;
      border-radius: 8px;
      text-align: center;
      display: none;
    }

    .result.active {
      display: block;
    }

    .result-title {
      font-size: 1.25rem;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .result-text {
      font-size: 0.9rem;
    }

    .etanol-best {
      background-color: #d1fae5;
      color: #065f46;
      border: 1px solid #a7f3d0;
    }

    .gasolina-best {
      background-color: #fee2e2;
      color: #991b1b;
      border: 1px solid #fecaca;
    }
  </style>
</head>
<body>

  <div class="card">
    <h1>Calculadora Flex</h1>
    <p class="subtitle">Descubra qual combustível vale mais a pena</p>

    <div class="input-group">
      <label for="gasolina">Preço da Gasolina (R$)</label>
      <div class="input-wrapper">
        <span class="currency">R$</span>
        <input type="number" id="gasolina" placeholder="5,99" step="0.01" min="0">
      </div>
    </div>

    <div class="input-group">
      <label for="etanol">Preço do Etanol (R$)</label>
      <div class="input-wrapper">
        <span class="currency">R$</span>
        <input type="number" id="etanol" placeholder="3,49" step="0.01" min="0">
      </div>
    </div>

    <button onclick="calcular()">Calcular Vantagem</button>

    <div id="result" class="result">
      <div id="resultTitle" class="result-title"></div>
      <div id="resultText" class="result-text"></div>
    </div>
  </div>

  <script>
    function calcular() {
      const gasolina = parseFloat(document.getElementById('gasolina').value);
      const etanol = parseFloat(document.getElementById('etanol').value);
      const resultDiv = document.getElementById('result');
      const resultTitle = document.getElementById('resultTitle');
      const resultText = document.getElementById('resultText');

      if (!gasolina || !etanol || gasolina <= 0 || etanol <= 0) {
        alert("Por favor, preencha ambos os valores corretamente.");
        return;
      }

      // Proporção de paridade de 68% (considerando a mistura atual de etanol anidro)
      const ratio = etanol / gasolina;
      const percentage = (ratio * 100).toFixed(1);

      resultDiv.classList.add('active');

      if (ratio <= 0.68) {
        resultDiv.className = "result active etanol-best";
        resultTitle.textContent = "Abasteça com ETANOL!";
        resultText.innerHTML = `O preço do etanol é <strong>${percentage}%</strong> do preço da gasolina.<br>Abaixo do limite de 68%.`;
      } else {
        resultDiv.className = "result active gasolina-best";
        resultTitle.textContent = "Abasteça com GASOLINA!";
        resultText.innerHTML = `O preço do etanol é <strong>${percentage}%</strong> do preço da gasolina.<br>Acima do limite de 68%.`;
      }
    }
  </script>

</body>
</html>
